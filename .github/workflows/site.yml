name: Static Site CI
on:
  schedule:
    - cron: "0 1 * * *"
  repository_dispatch:
    types: [static-site]
  workflow_dispatch:
  push:
    branches:
      - master
      - main
    paths:
      - ".upptimerc.yml"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: upptime/uptime-monitor@master
        with:
          command: "site"
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
      - name: Locate generated site
        id: locate
        run: |
          for d in "site/__sapper__/export" "__sapper__/export" "_site"; do
            if [ -d "$d" ]; then
              echo "found at $d"
              echo "site_dir=$d" >> $GITHUB_OUTPUT
              ls -la "$d" | head -20
              exit 0
            fi
          done
          echo "Nenhum dir de output encontrado, listando workspace:"
          find . -maxdepth 4 -type d \( -name "export" -o -name "_site" -o -name "build" \) 2>/dev/null | head -10
          exit 1
      - name: Copy CNAME to site output
        run: |
          if [ -f CNAME ]; then
            cp CNAME "${{ steps.locate.outputs.site_dir }}/CNAME"
            echo "CNAME copied: $(cat CNAME)"
          fi
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.locate.outputs.site_dir }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
